<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Himura Pixel Tools</title>
<style>
  :root { color-scheme: dark; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(circle at 50% 30%, #2a2433 0%, #15121c 70%);
    color: #e9e3f1; display: flex; align-items: center; justify-content: center;
  }
  .card { text-align: center; max-width: 460px; padding: 32px; }
  .logo {
    width: 96px; height: 96px; margin: 0 auto 18px; border-radius: 16px;
    background: #1c1824; display: grid; place-items: center;
    box-shadow: 0 8px 40px rgba(0,0,0,.45);
    image-rendering: pixelated;
  }
  h1 { font-size: 22px; margin: 0 0 6px; letter-spacing: .3px; }
  p { color: #b3a9c4; margin: 6px 0; font-size: 14px; line-height: 1.5; }
  .bar { width: 220px; height: 6px; margin: 18px auto 4px; background: #2c2638; border-radius: 4px; overflow: hidden; }
  .bar > i { display: block; height: 100%; width: 40%; background: linear-gradient(90deg,#5ac6b8,#cd9d6e);
    border-radius: 4px; animation: slide 1.2s ease-in-out infinite; }
  @keyframes slide { 0% { margin-left: -45%; } 100% { margin-left: 105%; } }
  #hint { display: none; margin-top: 18px; padding: 14px; background: #221c2c;
    border: 1px solid #3a3146; border-radius: 10px; font-size: 13px; }
  code { background: #15121c; padding: 1px 6px; border-radius: 5px; color: #cd9d6e; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg width="64" height="64" viewBox="0 0 8 8" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
        <rect x="2" y="1" width="1" height="6" fill="#5ac6b8"/>
        <rect x="5" y="1" width="1" height="6" fill="#5ac6b8"/>
        <rect x="3" y="3" width="2" height="1" fill="#cd9d6e"/>
      </svg>
    </div>
    <h1>Himura Pixel Tools</h1>
    <p id="status">Starting the local engine&hellip;</p>
    <div class="bar"><i></i></div>
    <div id="hint">
      <p>The backend is taking a while to start.</p>
      <p>If this is the first run, finish the setup window, then reopen the app.
         You can also start it manually with <code>START.BAT</code>.</p>
    </div>
  </div>
<script>
  var API = "http://127.0.0.1:8765";
  var tries = 0;
  async function poll() {
    tries++;
    try {
      var r = await fetch(API + "/api/health", { cache: "no-store" });
      if (r.ok) { window.location.replace(API + "/"); return; }
    } catch (e) { /* not up yet */ }
    if (tries === 12) document.getElementById("status").textContent = "Loading models and runtime, this can take a moment…";
    setTimeout(poll, 700);
  }
  setTimeout(function () { document.getElementById("hint").style.display = "block"; }, 45000);
  poll();
</script>
</body>
</html>
